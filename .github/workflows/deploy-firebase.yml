name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - "main"
    paths: &paths
      - .github/workflows/deploy-*.yml
      - "!**/*.md"
      - "**"
  pull_request:
    paths: *paths
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.sha }}"
  cancel-in-progress: true

permissions: {}

jobs:
  preview:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    environment: firebase # @upstream-issue https://firebase.uservoice.com/forums/948424-general/suggestions/51498368-firebase-init-hosting-github-environment-secret
    permissions:
      checks: write
      contents: read
      pull-requests: write
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_GIT_COMMIT_SHA: ${{ github.sha }}

      - name: Deploy Preview to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@500ac625ca2dd40cbd15f7659af953801858032a # v0.11.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}

  live:
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    environment: firebase # @upstream-issue https://firebase.uservoice.com/forums/948424-general/suggestions/51498368-firebase-init-hosting-github-environment-secret
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_GIT_COMMIT_SHA: ${{ github.sha }}

      - name: Deploy Live Site to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@500ac625ca2dd40cbd15f7659af953801858032a # v0.11.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}

# Ensure the following secrets exist in `firebase` Environment Secrets.
# - FIREBASE_SERVICE_ACCOUNT
# - FIREBASE_PROJECT_ID
