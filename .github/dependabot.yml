version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      npm:
        patterns:
          - "*"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
  - package-ecosystem: "swift"
    directory: "/.agents/skills/xcode-project-setup/scripts/xcode_spm_setup"
    schedule:
      interval: "daily"
    groups:
      swift:
        patterns:
          - "*"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
